<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLTMASTER PRO | ELECTRICAL DESIGN TOOLS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root { --bg:#020617; --card:#111827; --accent:#22c55e; --text:#94a3b8; --border:#334155; }
body{margin:0;font-family: Arial, sans-serif;background:var(--bg);color:white;padding-bottom:50px;}
header{text-align:center;padding:20px;background:#0f172a;border-bottom:3px solid var(--accent);}
header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 1px; }
header p { margin: 5px 0 0 0; color: var(--accent); font-weight: bold; font-size: 0.9rem; }
.container{max-width:1000px;margin:auto;padding:10px;}
.card{background:var(--card);padding:15px;border-radius:12px;margin-top:15px;border:1px solid var(--border);}
h3{margin-top:0;color:var(--accent);font-size:1rem;border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:10px;}
.grid{display:grid;grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));gap:10px;margin-bottom:10px;}
input,select{width:100%;padding:8px;background:#0f172a;color:white;border:1px solid var(--border);border-radius:4px;box-sizing: border-box;font-size:0.85rem;}
button{width:100%;padding:15px;margin-top:15px;background:var(--accent);border:none;font-weight:bold;cursor:pointer;border-radius:4px;font-size:1rem;color:#020617;}
.result{white-space:pre-wrap;margin-top:20px;background:#000;padding:20px;display:none;border-radius:8px;font-family: 'Courier New', monospace;font-size:0.85rem;border:1px solid var(--accent);line-height:1.3;}
label{font-size:0.7rem;color:var(--text);display:block;margin-bottom:3px;}
.ac-group { border: 1px dashed var(--border); padding: 8px; border-radius: 4px; margin-top: 5px; }
</style>
</head>
<body>

<header>
    <h1>VOLTMASTER PRO</h1>
    <p>ELECTRICAL DESIGN TOOLS (ST/IEC COMPLIANT)</p>
</header>

<div class="container">
    <div class="card">
        <h3>1. System & Phase Selection</h3>
        <div class="grid">
            <div>
                <label>Supply System</label>
                <select id="phaseType">
                    <option value="1">1-Phase (230V)</option>
                    <option value="3">3-Phase (400V)</option>
                </select>
            </div>
            <div><label>Diversity (DF)</label><input id="pDF" value="0.8" step="0.1" type="number"></div>
            <div><label>Power Factor</label><input id="pPF" value="0.85" step="0.05" type="number"></div>
            <div>
                <label>Wiring Style</label>
                <select id="wireStyle">
                    <option value="surface">Surface (Standard)</option>
                    <option value="concealed">Concealed (Premium)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>2. Circuit Quantities</h3>
        <div class="grid">
            <div><label>Lighting</label><input id="qL" value="10" type="number"></div>
            <div><label>Ceiling Fan</label><input id="qF" value="5" type="number"></div>
            <div><label>Exhaust Fan</label><input id="qEF" value="2" type="number"></div>
            <div><label>Socket Pts</label><input id="qS" value="12" type="number"></div>
            <div><label>Water Heater</label><input id="qWH" value="2" type="number"></div>
            <div><label>Outdoor Light</label><input id="qOL" value="4" type="number"></div>
        </div>
    </div>

    <div class="card">
        <h3>3. Air-Conditioning Inventory</h3>
        <div class="grid">
            <div class="ac-group">
                <label>AC 1 (HP)</label><input id="hp1" value="1.0" step="0.5" type="number">
                <label>Qty</label><input id="qty1" value="3" type="number">
            </div>
            <div class="ac-group">
                <label>AC 2 (HP)</label><input id="hp2" value="1.5" step="0.5" type="number">
                <label>Qty</label><input id="qty2" value="2" type="number">
            </div>
            <div class="ac-group">
                <label>AC 3 (HP)</label><input id="hp3" value="3.0" step="0.5" type="number">
                <label>Qty</label><input id="qty3" value="1" type="number">
            </div>
        </div>
    </div>

    <div class="card">
        <h3>4. Technical Parameters</h3>
        <div class="grid">
            <div><label>Light (W)</label><input id="wL" value="15" type="number"></div>
            <div><label>Fan (W)</label><input id="wF" value="75" type="number"></div>
            <div><label>Exhaust (W)</label><input id="wEF" value="40" type="number"></div>
            <div><label>Outdoor (W)</label><input id="wOL" value="30" type="number"></div>
            <div><label>Heater (kW)</label><input id="kwWH" value="3.0" step="0.1" type="number"></div>
        </div>
        <div class="grid">
            <div><label>Lights/Cct</label><input id="pL" value="10" type="number"></div>
            <div><label>Fans/Cct</label><input id="pF" value="10" type="number"></div>
            <div><label>Exhaust/Cct</label><input id="pEF" value="10" type="number"></div>
            <div><label>Outdoor/Cct</label><input id="pOL" value="10" type="number"></div>
            <div><label>Max. Length (m)</label><input id="cLen" value="25" type="number"></div>
            <div><label>Socket pts/Cct</label><select id="pS"><option value="2">2 (Radial)</option><option value="10">10 (Ring)</option></select></div>
        </div>
        <button onclick="calc()">GENERATE COMPLIANCE REPORT</button>
        <div id="out" class="result"></div>
        <button style="background:#334155;color:white" onclick="pdf()">EXPORT 2-PAGE PDF</button>
    </div>
</div>

<script>
const breakers = [20, 32, 40, 63, 80, 100, 125];
const mvAM = { "1.5": 29, "2.5": 18, "4.0": 11, "6.0": 7.3, "10.0": 4.4, "16.0": 2.8, "25.0": 1.8 };

function getACSpecs(hp) {
    if (hp <= 1.5) return { mcb: "16A", cable: "2.5mm²" };
    if (hp <= 2.5) return { mcb: "20A", cable: "4.0mm²" };
    return { mcb: "32A", cable: "6.0mm²" };
}

function calc() {
    try {
        const getV = (id) => {
            const el = document.getElementById(id);
            return el ? parseFloat(el.value) || 0 : 0;
        };

        const phase = document.getElementById('phaseType').value;
        const wStyle = document.getElementById('wireStyle').value;
        const len = getV('cLen');
        const pf = getV('pPF');
        const derate = 1.0; 
        let totalMCB = 0;

        let totalACWattage = 0;
        let acReportLines = "";
        let acCount = 0;
        for(let i=1; i<=3; i++){
            let h = getV('hp'+i); 
            let q = getV('qty'+i);
            if(q > 0){
                totalACWattage += (h * 746 * q);
                totalMCB += q;
                acCount += q;
                let s = getACSpecs(h);
                acReportLines += `   - ${h} HP: MCB ${s.mcb} | Cable ${s.cable} | Qty: ${q} Units\n`;
            }
        }

        const wWH = getV('kwWH') * 1000;
        const wOL_Total = getV('qOL') * getV('wOL');
        const TCL = (getV('qL')*getV('wL')) + (getV('qF')*getV('wF')) + (getV('qEF')*getV('wEF')) + (getV('qS')*250) + totalACWattage + (getV('qWH')*wWH) + wOL_Total;
        const MD = TCL * getV('pDF');
        const IbTotal = (phase == "1") ? MD / (230 * pf) : MD / (1.732 * 400 * pf);

        const cL = Math.ceil(getV('qL') / (getV('pL') || 1));
        const cF = Math.ceil(getV('qF') / (getV('pF') || 1));
        const cEF = Math.ceil(getV('qEF') / (getV('pEF') || 1));
        const cS = Math.ceil(getV('qS') / (getV('pS') || 1));
        const cOL = Math.ceil(getV('qOL') / (getV('pOL') || 1));
        
        totalMCB += (cL + cF + cEF + cS + cOL + getV('qWH'));

        const mainSwitch = breakers.find(b => b >= (IbTotal * 1.25)) || 63;
        const incomingSize = (mainSwitch <= 32) ? 6 : (mainSwitch <= 40) ? 10 : (mainSwitch <= 63) ? 16 : 25;
        const mV = mvAM[incomingSize.toFixed(1)] || 2.8;
        const vDrop = (mV * IbTotal * len) / 1000;
        const vDropPct = (vDrop / (phase == "1" ? 230 : 400)) * 100;

        let wayFactor = (phase == "1") ? 12 : 18; 
        let equipmentSpace = (phase == "1" ? 6 : 10); 
        let totalWaysNeeded = Math.ceil((totalMCB + equipmentSpace) * 1.25);
        let dbRows = Math.ceil(totalWaysNeeded / wayFactor);
        let dbWidth = (phase == "1") ? 300 : 450;
        let dbHeight = (dbRows === 1) ? 350 : (dbRows === 2) ? 500 : 700;

        let mult = (wStyle === 'concealed') ? 1.4 : 1.0;
        let quote = 0;
        quote += (getV('qL') + getV('qF') + getV('qEF') + getV('qOL')) * (85 * mult);
        quote += getV('qS') * (160 * mult);
        quote += (acCount + getV('qWH')) * (250 * mult);
        quote += (phase == "1") ? 600 : 1250;

        let report = `============================================================
                      VOLTMASTER PRO
              ELECTRICAL DESIGN TOOLS REPORT
============================================================
SYSTEM TYPE   : ${phase}-PHASE (${phase == "1" ? "230V" : "400V"})
DATE          : ${new Date().toLocaleDateString()}
DERATING      : ${derate} Factor Applied

[1. INDIVIDUAL CIRCUIT DETAILS]
------------------------------------------------------------
A. LIGHTING
   - Specs: ${getV('wL')}W/pt | Circuits: ${cL} | MCB: 6A | 1.5mm²

B. CEILING FANS
   - Specs: ${getV('wF')}W/pt | Circuits: ${cF} | MCB: 10A | 1.5mm²

C. OUTDOOR LIGHTING
   - Specs: ${getV('wOL')}W/pt | Circuits: ${cOL} | MCB: 6A | 1.5mm²
   - Protection: RCD/RCCB 25A / 30mA (Sensitivity) (MS 1979 Clause 3.6)

D. SOCKET OUTLET
   - Type: ${(getV('pS')==2)?'Radial':'Ring'} | Circuits: ${cS} | MCB: ${(getV('pS')==2)?'20A':'32A'} | 4.0mm²

E. AIR-CONDITIONING BREAKDOWN
${acReportLines}
F. WATER HEATER
   - Specs: ${getV('kwWH')}kW | Qty: ${getV('qWH')} | MCB: 20A | 4.0mm²
   - Protection: ELCB/RCD 25A / 10mA (Sensitivity) (Wet Area Compliance)

[2. DISTRIBUTION BOARD (DB) & SAFETY DEVICES]
------------------------------------------------------------
Main Switch    : ${mainSwitch}A (${phase == "1" ? "2-Pole" : "4-Pole"})
Incoming Cable : ${incomingSize}mm² (Cu/PVC/PVC)
Earth CPC      : ${(incomingSize <= 16) ? 16 : 25}mm² (Green/Yellow)

SURGE PROTECTIVE DEVICE (SPD):
   - Spec: Type 2, ${phase == "1" ? "2-Pole (L+N)" : "4-Pole (3L+N)"} | Imax 40kA | Up < 1.5kV
   - Complies with IEC 61643-11

RESIDUAL CURRENT DEVICES (RCD/ELCB):
   - Main/General : 63A / 100mA (Sensitivity)
   - Outdoor Zone : 25A / 30mA (Sensitivity)
   - Wet Area Zone: 25A / 10mA (Sensitivity)

DB PHYSICAL SPECS:
   - Total MCB Qty: ${totalMCB} units
   - Spare Capacity: 25% Applied
   - DB Type/Size : ${dbRows} Row(s) (${totalWaysNeeded} Ways Total)
   - Rec. DB Dim. : ${dbWidth}mm(W) x ${dbHeight}mm(H)
   ${phase == "3" ? "Phase Balance  : ~" + Math.ceil(totalMCB/3) + " MCBs per Phase" : ""}

[3. ESTIMATED QUOTATION (MARKET RATE 2026)]
------------------------------------------------------------
WIRING STYLE   : ${wStyle.toUpperCase()}
ESTIMATED TOTAL: RM ${quote.toLocaleString()}

*INCLUSIONS: Labor, conduits, wiring, and DB components.
*EXCLUSIONS: Actual appliances (AC units, Fans, Water Heaters, 
            Lamps) and AC copper piping/gas topping.

*DISCLAIMER: This is a budgetary estimate based on standard 
lengths. Actual project cost is subject to site measurement, 
routing complexity, and final material selection.*

[4. BORANG G & H (ST COMPLIANCE)]
------------------------------------------------------------
- Regulation 14 & 15 Compliance Summary
- Min. Competency Required: ${(phase == "1") ? "PW1 / PW2" : "PW3 / PW4"}
- Mandatory Tests: Continuity, Insulation Resistance, 
  Polarity, Earth Resistance (< 10 Ohm), RCD Trip Test.

[5. DESIGN PARAMETERS & SUMMARY]
------------------------------------------------------------
TCL: ${(TCL/1000).toFixed(2)} kW | MD: ${(MD/1000).toFixed(2)} kW
Total Current (Ib): ${IbTotal.toFixed(2)} A
Voltage Drop: ${vDrop.toFixed(2)}V (${vDropPct.toFixed(2)}%)
Status: ${vDropPct <= 4 ? "COMPLIANT" : "NON-COMPLIANT"}

Ref Standards: ST (Electricity Regulations 1994) / MS 1979 / IEC 60364
------------------------------------------------------------`;

        document.getElementById('out').style.display = "block";
        document.getElementById('out').innerText = report;
    } catch (err) {
        alert("Logic Error: " + err.message);
    }
}

async function pdf() {
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF('p', 'mm', 'a4');
    const outEl = document.getElementById('out');
    
    if (outEl.style.display === "none" || !outEl.innerText) {
        alert("Please generate the report first!");
        return;
    }

    const fullText = outEl.innerText;
    
    // Split text precisely before the Distribution Board section for Page 2
    const splitKey = "[2. DISTRIBUTION BOARD";
    const sections = fullText.split(splitKey);
    const page1Content = sections[0].trim();
    const page2Content = (splitKey + sections[1]).trim();

    const addHeaderFooter = (pageNum) => {
        doc.setFont("helvetica", "bold");
        doc.setFontSize(12);
        doc.setTextColor(34, 197, 94); // VoltMaster Accent Green
        doc.text("VOLTMASTER PRO | TECHNICAL COMPLIANCE REPORT", 15, 15);
        
        doc.setFontSize(8);
        doc.setTextColor(150);
        doc.text(`ST/IEC Standards Compliance | Page ${pageNum} of 2`, 15, 285);
        doc.text(`Report ID: VM-${new Date().getTime()}`, 150, 285);
        doc.line(15, 18, 195, 18); // Header underline
    };

    // --- Page 1 Rendering ---
    addHeaderFooter(1);
    doc.setFont("courier", "normal");
    doc.setFontSize(9);
    doc.setTextColor(0, 0, 0);
    let p1Lines = doc.splitTextToSize(page1Content, 180);
    doc.text(p1Lines, 15, 30);

    // --- Page 2 Rendering ---
    doc.addPage();
    addHeaderFooter(2);
    doc.setFont("courier", "normal");
    doc.setFontSize(9);
    doc.setTextColor(0, 0, 0);
    let p2Lines = doc.splitTextToSize(page2Content, 180);
    doc.text(p2Lines, 15, 30);

    doc.save("VoltMaster_Pro_Compliance_Report.pdf");
}
</script>
</body>
</html>
